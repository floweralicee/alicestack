<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Hana</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 96px;
      height: 96px;
      overflow: hidden;
      background: transparent;
      -webkit-app-region: no-drag;
    }
    #pet {
      display: block;
      width: 96px;
      height: 96px;
      user-select: none;
      -webkit-user-drag: none;
      pointer-events: auto;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <img id="pet" src="hana-icon/active.svg" width="96" height="96" alt="" draggable="false" />
  <script>
    const pet = document.getElementById('pet')

    const ASSETS = {
      active: 'hana-icon/active.svg',
      touch:  'hana-icon/touch.svg',
      eat:    'hana-icon/eat.svg',
      sleep:  'hana-icon/sleep.svg',
    }

    const BURPS = [
      'hana-icon/burp1.mp3',
      'hana-icon/burp2.mp3',
      'hana-icon/burp3.mp3',
    ]

    const DRAG_THRESHOLD = 3
    const IDLE_MS = 120 * 1000
    const EAT_DURATION = 1200  // ms to stay in eat state after burp

    let visual = 'active'
    let idleTimer = null
    let hovering = false
    let isDragging = false
    let didDrag = false
    let lastScreenX = 0, lastScreenY = 0
    let mouseDownX = 0, mouseDownY = 0
    let pendingDx = 0, pendingDy = 0
    let dragFlush = null

    function setVisual(next) {
      visual = next
      pet.src = ASSETS[next]
    }

    function playBurp() {
      const src = BURPS[Math.floor(Math.random() * BURPS.length)]
      const audio = new Audio(src)
      audio.volume = 0.6
      audio.play().catch(() => {})
    }

    function resetIdleTimer() {
      clearTimeout(idleTimer)
      idleTimer = setTimeout(() => {
        if (['active', 'touch', 'eat'].includes(visual)) setVisual('sleep')
      }, IDLE_MS)
    }

    function bumpInteraction() {
      if (visual === 'sleep') setVisual('active')
      resetIdleTimer()
    }

    // Win logged from main process → eat + burp animation
    window.hana.onWinLogged((data) => {
      bumpInteraction()
      setVisual('eat')
      playBurp()
      setTimeout(() => {
        if (visual === 'eat') setVisual(hovering ? 'eat' : 'active')
      }, EAT_DURATION)
    })

    // Click (not drag) → open bubble
    pet.addEventListener('click', (e) => {
      if (didDrag) return
      bumpInteraction()
      window.hana.openBubble()
    })

    pet.addEventListener('pointerenter', () => { hovering = true; bumpInteraction() })
    pet.addEventListener('pointerleave', () => { hovering = false; resetIdleTimer() })

    // Drag to move
    pet.addEventListener('pointerdown', (e) => {
      if (e.button !== 0) return
      bumpInteraction()
      pet.setPointerCapture(e.pointerId)
      isDragging = true
      didDrag = false
      lastScreenX = e.screenX
      lastScreenY = e.screenY
      mouseDownX = e.clientX
      mouseDownY = e.clientY
      pendingDx = 0
      pendingDy = 0
    })

    document.addEventListener('pointermove', (e) => {
      if (!isDragging) return
      pendingDx += e.screenX - lastScreenX
      pendingDy += e.screenY - lastScreenY
      lastScreenX = e.screenX
      lastScreenY = e.screenY
      if (!didDrag) {
        const dx = e.clientX - mouseDownX
        const dy = e.clientY - mouseDownY
        if (Math.abs(dx) > DRAG_THRESHOLD || Math.abs(dy) > DRAG_THRESHOLD) {
          didDrag = true
          setVisual('touch')
        }
      }
      if (!dragFlush) {
        dragFlush = requestAnimationFrame(() => {
          dragFlush = null
          if (pendingDx !== 0 || pendingDy !== 0) {
            window.hana.moveBy(pendingDx, pendingDy)
            pendingDx = 0
            pendingDy = 0
          }
        })
      }
    })

    function endDrag() {
      if (!isDragging) return
      isDragging = false
      if (dragFlush) { cancelAnimationFrame(dragFlush); dragFlush = null }
      if (pendingDx !== 0 || pendingDy !== 0) {
        window.hana.moveBy(pendingDx, pendingDy)
        pendingDx = 0; pendingDy = 0
      }
      if (didDrag) { didDrag = false; setVisual('active') }
    }

    document.addEventListener('pointerup', (e) => { if (e.button !== 0) return; endDrag(); bumpInteraction() })
    document.addEventListener('pointercancel', () => { endDrag(); bumpInteraction() })

    resetIdleTimer()
  </script>
</body>
</html>
